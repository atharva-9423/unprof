<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradebook — Student Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <header>
    <span class="tag">📒 Gradebook v1.0</span>
    <h1>Student Management System</h1>
    <p class="subtitle">Add students, record marks, track pass/fail — all in your browser.</p>
  </header>

  <section class="panel panel--form">
    <h2 class="panel-title">Add Student</h2>
    <form id="studentForm" novalidate>
      <div class="form-grid">
        <div class="field">
          <label for="nameInput">Name</label>
          <input type="text" id="nameInput" placeholder="e.g. Priya Sharma" />
        </div>
        <div class="field">
          <label for="rollInput">Roll No.</label>
          <input type="text" id="rollInput" placeholder="e.g. 24" />
        </div>

        <div class="marks-row">
          <div class="field">
            <label for="mark1Input">Marks — Subject 1</label>
            <input type="number" id="mark1Input" placeholder="0–100" min="0" max="100" />
          </div>
          <div class="field">
            <label for="mark2Input">Marks — Subject 2</label>
            <input type="number" id="mark2Input" placeholder="0–100" min="0" max="100" />
          </div>
          <div class="field">
            <label for="mark3Input">Marks — Subject 3</label>
            <input type="number" id="mark3Input" placeholder="0–100" min="0" max="100" />
          </div>
        </div>

        <p class="form-error" id="formError"></p>

        <button type="submit" class="btn btn--primary">Add Student</button>
      </div>
    </form>
  </section>

  <section class="panel panel--ledger">
    <div class="ledger-head">
      <h2 class="panel-title">Class Record</h2>
      <span class="count-tag" id="countTag">0 students</span>
    </div>

    <table id="studentTable">
      <thead>
        <tr>
          <th>Roll</th>
          <th>Name</th>
          <th class="num">Average</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="studentTableBody"></tbody>
    </table>

    <div class="empty-state" id="emptyState">
      <span class="empty-emoji">🗂️</span>
      <p>No students added yet.<br>Use the form above to add your first record.</p>
    </div>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
